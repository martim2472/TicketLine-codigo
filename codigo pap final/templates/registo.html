{% extends "base.html" %}
{% block content %}
<div class="form-page">
<div class="glass-card" style="max-width:500px;">
    <h2><i class="fa-solid fa-user-plus" style="color:var(--primary-glow);"></i> Criar Conta</h2>
    <p style="color:var(--text-muted);margin-bottom:1.8rem;font-size:.92rem;">Junta-te ao Ticketline. Primeiro diz-nos que tipo de utilizador és:</p>

    <form method="POST" action="{{ url_for('registo') }}" id="reg-form">

        <!-- Seleção de tipo (cliente / agente) -->
        <div class="form-group">
            <label>Tipo de Conta</label>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:.8rem;margin-top:.2rem;">
                <label id="label-cliente" for="tipo-cliente"
                       style="display:flex;flex-direction:column;align-items:center;gap:.5rem;padding:1rem;border:2px solid var(--border);border-radius:12px;cursor:pointer;transition:border-color .2s,background .2s;"
                       class="tipo-option-label">
                    <i class="fa-solid fa-user" style="font-size:1.6rem;color:var(--primary-glow);"></i>
                    <strong>Cliente</strong>
                    <small style="color:var(--text-muted);text-align:center;font-size:.78rem;">Abre pedidos de suporte</small>
                    <input type="radio" id="tipo-cliente" name="tipo" value="cliente" required style="display:none;" checked>
                </label>
                <label id="label-agente" for="tipo-agente"
                       style="display:flex;flex-direction:column;align-items:center;gap:.5rem;padding:1rem;border:2px solid var(--border);border-radius:12px;cursor:pointer;transition:border-color .2s,background .2s;"
                       class="tipo-option-label">
                    <i class="fa-solid fa-headset" style="font-size:1.6rem;color:var(--purple);"></i>
                    <strong>Agente de Suporte</strong>
                    <small style="color:var(--text-muted);text-align:center;font-size:.78rem;">Responde aos tickets</small>
                    <input type="radio" id="tipo-agente" name="tipo" value="helpdesk" style="display:none;">
                </label>
            </div>
        </div>

        <div class="form-group">
            <label for="nome">Nome Completo</label>
            <input type="text" id="nome" name="nome" required placeholder="O teu nome">
        </div>
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required placeholder="exemplo@email.com">
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required placeholder="••••••••" minlength="6">
        </div>

        <!-- Empresa — só visível para clientes -->
        <div class="form-group" id="empresa-field">
            <label for="empresa">Empresa <span style="font-weight:400;color:var(--text-muted);">(opcional)</span></label>
            <input type="text" id="empresa" name="empresa" placeholder="Nome da empresa">
        </div>

        <button type="submit" class="btn btn-primary btn-submit">
            <i class="fa-solid fa-check-circle"></i> Criar Conta
        </button>
    </form>

    <div style="margin-top:1.4rem;text-align:center;font-size:.88rem;color:var(--text-muted);">
        Já tens conta?
        <a href="{{ url_for('login') }}" style="color:var(--primary-glow);font-weight:700;text-decoration:none;"> Entrar →</a>
    </div>
</div>
</div>

<style>
.tipo-option-label.selected {
    border-color: var(--primary-glow);
    background: rgba(255,117,140,.07);
}
#label-agente.selected {
    border-color: var(--purple);
    background: rgba(166,75,244,.07);
}
</style>

<script>
const labels = document.querySelectorAll('.tipo-option-label');
const radioC = document.getElementById('tipo-cliente');
const radioA = document.getElementById('tipo-agente');
const empField = document.getElementById('empresa-field');

function updateUI() {
    document.getElementById('label-cliente').classList.toggle('selected', radioC.checked);
    document.getElementById('label-agente').classList.toggle('selected', radioA.checked);
    empField.style.display = radioC.checked ? 'block' : 'none';
}
radioC.addEventListener('change', updateUI);
radioA.addEventListener('change', updateUI);
updateUI(); // estado inicial
</script>
{% endblock %}
