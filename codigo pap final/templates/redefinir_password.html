{% extends "base.html" %}
{% block content %}
<div class="form-page">
<div class="glass-card">
    <h2><i class="fa-solid fa-lock-open" style="color:var(--purple);"></i> Nova Password</h2>
    <p style="color:var(--text-muted);margin-top:0.3rem;margin-bottom:2rem;">
        Escolhe uma nova password para a tua conta. Deve ter pelo menos 6 caracteres.
    </p>

    <form method="POST" action="{{ url_for('redefinir_password', token=token) }}">
        <div class="form-group">
            <label for="password">Nova Password</label>
            <input type="password" id="password" name="password" required
                   placeholder="••••••••" minlength="6">
        </div>
        <div class="form-group">
            <label for="confirma">Confirmar Password</label>
            <input type="password" id="confirma" name="confirma" required
                   placeholder="••••••••" minlength="6">
        </div>
        <button type="submit" class="btn btn-primary btn-submit"
                style="background:linear-gradient(45deg,var(--purple),#c471ed);box-shadow:0 4px 18px rgba(166,75,244,0.3);">
            <i class="fa-solid fa-check"></i> Guardar Nova Password
        </button>
    </form>

    <p style="margin-top:1.5rem;font-size:0.88rem;color:var(--text-muted);">
        <a href="{{ url_for('login') }}"
           style="color:var(--primary-glow);text-decoration:none;font-weight:600;">
            <i class="fa-solid fa-arrow-left"></i> Voltar ao Login
        </a>
    </p>
</div>
</div>
{% endblock %}
