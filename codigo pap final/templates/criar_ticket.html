{% extends "base.html" %}
{% block content %}
<div class="form-page">
<div class="glass-card" style="max-width:560px;">
    <h2><i class="fa-solid fa-plus-circle" style="color:var(--primary-glow);"></i> Criar Ticket</h2>
    <p style="color:var(--text-muted);margin-bottom:2rem;margin-top:.3rem;">Descreve o teu problema e a nossa equipa responde em breve.</p>

    <form method="POST" action="{{ url_for('criar_ticket') }}" enctype="multipart/form-data">
        <div class="form-group">
            <label for="titulo">Título do Problema</label>
            <input type="text" id="titulo" name="titulo" required placeholder="Ex: Não consigo aceder à conta">
        </div>
        <div class="form-group">
            <label for="categoria">Categoria</label>
            <select id="categoria" name="categoria">
                <option value="geral">Geral</option>
                <option value="conta">Conta</option>
                <option value="pagamento">Pagamento</option>
                <option value="tecnico">Problema Técnico</option>
                <option value="hardware">Hardware</option>
                <option value="outro">Outro</option>
            </select>
        </div>
        <div class="form-group">
            <label for="prioridade">Prioridade</label>
            <select id="prioridade" name="prioridade">
                <option value="baixa">Baixa</option>
                <option value="normal" selected>Normal</option>
                <option value="alta">Alta</option>
                <option value="urgente">Urgente</option>
            </select>
        </div>
        <div class="form-group">
            <label for="descricao">Descrição Detalhada</label>
            <textarea id="descricao" name="descricao" required
                      placeholder="Descreve o problema com o máximo de detalhe..."
                      style="min-height:130px;resize:vertical;"></textarea>
        </div>

        <!-- Upload de anexos -->
        <div class="form-group">
            <label>Anexar Ficheiros <span style="font-weight:400;color:var(--text-muted);">(opcional)</span></label>
            <label class="file-upload-label" for="anexos" style="width:100%;justify-content:center;">
                <i class="fa-solid fa-upload"></i> Escolher imagens ou ficheiros
            </label>
            <input type="file" id="anexos" name="anexos" multiple accept="image/*,.pdf,.txt,.zip">
            <small id="file-names-criar" style="color:var(--text-muted);font-size:.78rem;display:block;margin-top:5px;text-align:center;"></small>
        </div>

        <!-- Preview de imagens selecionadas -->
        <div id="img-previews" style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:1rem;"></div>

        <button type="submit" class="btn btn-primary btn-submit">
            <i class="fa-solid fa-paper-plane"></i> Enviar Ticket
        </button>
    </form>

    <p style="margin-top:1.5rem;font-size:.9rem;">
        <a href="{{ url_for('dashboard_cliente') }}" style="color:var(--primary-glow);text-decoration:none;font-weight:600;">
            <i class="fa-solid fa-arrow-left"></i> Voltar ao Painel
        </a>
    </p>
</div>
</div>

<script>
document.getElementById('anexos').addEventListener('change', function() {
    const names = Array.from(this.files).map(f=>f.name).join(', ');
    document.getElementById('file-names-criar').textContent = names;
    const prev = document.getElementById('img-previews');
    prev.innerHTML = '';
    Array.from(this.files).forEach(f => {
        if (!f.type.startsWith('image/')) return;
        const reader = new FileReader();
        reader.onload = e => {
            const img = document.createElement('img');
            img.src = e.target.result;
            img.style.cssText = 'width:80px;height:60px;object-fit:cover;border-radius:8px;border:1px solid var(--border);';
            prev.appendChild(img);
        };
        reader.readAsDataURL(f);
    });
});
</script>
{% endblock %}
