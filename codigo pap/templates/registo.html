{% extends "base.html" %}

{% block content %}
<div class="glass-card">
    <h2><i class="fa-solid fa-user-plus"></i> Criar Conta</h2>
    <p style="color: var(--text-muted); margin-bottom: 2rem;">Junta-te ao Ticketline e começa a receber suporte.</p>
    
    <form method="POST" action="{{ url_for('registo') }}">
        <div class="form-group">
            <label for="nome">Nome Completo</label>
            <input type="text" id="nome" name="nome" required placeholder="O teu nome">
        </div>
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required placeholder="oteuemail@exemplo.com">
        </div>
        <div class="form-group">
            <label for="password">Palavra-passe</label>
            <input type="password" id="password" name="password" required placeholder="••••••••">
        </div>
        <div class="form-group">
            <label for="tipo">Tipo de Conta</label>
            <select id="tipo" name="tipo" style="width:100%; padding:12px; border-radius:8px; border:1px solid var(--glass-border); background:rgba(255,255,255,0.05); color:white; font-family:'Outfit',sans-serif;">
                <option value="cliente">Cliente</option>
                <option value="helpdesk">Agente Helpdesk</option>
            </select>
        </div>
        <button type="submit" class="btn btn-primary btn-submit">Registar</button>
    </form>
    <p style="margin-top: 1.5rem; font-size: 0.9rem; color: var(--text-muted);">
        Já tens conta? <a href="{{ url_for('login') }}" style="color: var(--primary-glow); text-decoration: none;">Faz login aqui</a>
    </p>
</div>
{% endblock %}
